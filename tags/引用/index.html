  <script type="text/javascript">
    // Popup Window;
    var isfetched = false;
    var isXml = true;
    // Search DB path;
    var search_path = "search.xml";
    if (search_path.length === 0) {
      search_path = "search.xml";
    } else if (/json$/i.test(search_path)) {
      isXml = false;
    }
    var path = "/" + search_path;
    // monitor main search box;

    var onPopupClose = function (e) {
      $('.popup').hide();
      $('#local-search-input').val('');
      $('.search-result-list').remove();
      $('#no-result').remove();
      $(".local-search-pop-overlay").remove();
      $('body').css('overflow', '');
    }

    function proceedsearch() {
      $("body")
        .append('<div class="search-popup-overlay local-search-pop-overlay"></div>')
        .css('overflow', 'hidden');
      $('.search-popup-overlay').click(onPopupClose);
      $('.popup').toggle();
      var $localSearchInput = $('#local-search-input');
      $localSearchInput.attr("autocapitalize", "none");
      $localSearchInput.attr("autocorrect", "off");
      $localSearchInput.focus();
    }

    // search function;
    var searchFunc = function(path, search_id, content_id) {
      'use strict';

      // start loading animation
      $("body")
        .append('<div class="search-popup-overlay local-search-pop-overlay">' +
          '<div id="search-loading-icon">' +
          '<i class="fa fa-spinner fa-pulse fa-5x fa-fw"></i>' +
          '</div>' +
          '</div>')
        .css('overflow', 'hidden');
      $("#search-loading-icon").css('margin', '20% auto 0 auto').css('text-align', 'center');

      $.ajax({
        url: path,
        dataType: isXml ? "xml" : "json",
        async: true,
        success: function(res) {
          // get the contents from search data
          isfetched = true;
          $('.popup').detach().appendTo('.header-inner');
          var datas = isXml ? $("entry", res).map(function() {
            return {
              title: $("title", this).text(),
              content: $("content",this).text(),
              url: $("url" , this).text()
            };
          }).get() : res;
          var input = document.getElementById(search_id);
          var resultContent = document.getElementById(content_id);
          var inputEventFunction = function() {
            var searchText = input.value.trim().toLowerCase();
            var keywords = searchText.split(/[\s\-]+/);
            if (keywords.length > 1) {
              keywords.push(searchText);
            }
            var resultItems = [];
            if (searchText.length > 0) {
              // perform local searching
              datas.forEach(function(data) {
                var isMatch = false;
                var hitCount = 0;
                var searchTextCount = 0;
                var title = data.title.trim();
                var titleInLowerCase = title.toLowerCase();
                var content = data.content.trim().replace(/<[^>]+>/g,"");
                var contentInLowerCase = content.toLowerCase();
                var articleUrl = decodeURIComponent(data.url);
                var indexOfTitle = [];
                var indexOfContent = [];
                // only match articles with not empty titles
                if(title != '') {
                  keywords.forEach(function(keyword) {
                    function getIndexByWord(word, text, caseSensitive) {
                      var wordLen = word.length;
                      if (wordLen === 0) {
                        return [];
                      }
                      var startPosition = 0, position = [], index = [];
                      if (!caseSensitive) {
                        text = text.toLowerCase();
                        word = word.toLowerCase();
                      }
                      while ((position = text.indexOf(word, startPosition)) > -1) {
                        index.push({position: position, word: word});
                        startPosition = position + wordLen;
                      }
                      return index;
                    }

                    indexOfTitle = indexOfTitle.concat(getIndexByWord(keyword, titleInLowerCase, false));
                    indexOfContent = indexOfContent.concat(getIndexByWord(keyword, contentInLowerCase, false));
                  });
                  if (indexOfTitle.length > 0 || indexOfContent.length > 0) {
                    isMatch = true;
                    hitCount = indexOfTitle.length + indexOfContent.length;
                  }
                }

                // show search results

                if (isMatch) {
                  // sort index by position of keyword

                  [indexOfTitle, indexOfContent].forEach(function (index) {
                    index.sort(function (itemLeft, itemRight) {
                      if (itemRight.position !== itemLeft.position) {
                        return itemRight.position - itemLeft.position;
                      } else {
                        return itemLeft.word.length - itemRight.word.length;
                      }
                    });
                  });

                  // merge hits into slices

                  function mergeIntoSlice(text, start, end, index) {
                    var item = index[index.length - 1];
                    var position = item.position;
                    var word = item.word;
                    var hits = [];
                    var searchTextCountInSlice = 0;
                    while (position + word.length <= end && index.length != 0) {
                      if (word === searchText) {
                        searchTextCountInSlice++;
                      }
                      hits.push({position: position, length: word.length});
                      var wordEnd = position + word.length;

                      // move to next position of hit

                      index.pop();
                      while (index.length != 0) {
                        item = index[index.length - 1];
                        position = item.position;
                        word = item.word;
                        if (wordEnd > position) {
                          index.pop();
                        } else {
                          break;
                        }
                      }
                    }
                    searchTextCount += searchTextCountInSlice;
                    return {
                      hits: hits,
                      start: start,
                      end: end,
                      searchTextCount: searchTextCountInSlice
                    };
                  }

                  var slicesOfTitle = [];
                  if (indexOfTitle.length != 0) {
                    slicesOfTitle.push(mergeIntoSlice(title, 0, title.length, indexOfTitle));
                  }

                  var slicesOfContent = [];
                  while (indexOfContent.length != 0) {
                    var item = indexOfContent[indexOfContent.length - 1];
                    var position = item.position;
                    var word = item.word;
                    // cut out 100 characters
                    var start = position - 20;
                    var end = position + 80;
                    if(start < 0){
                      start = 0;
                    }
                    if (end < position + word.length) {
                      end = position + word.length;
                    }
                    if(end > content.length){
                      end = content.length;
                    }
                    slicesOfContent.push(mergeIntoSlice(content, start, end, indexOfContent));
                  }

                  // sort slices in content by search text's count and hits' count

                  slicesOfContent.sort(function (sliceLeft, sliceRight) {
                    if (sliceLeft.searchTextCount !== sliceRight.searchTextCount) {
                      return sliceRight.searchTextCount - sliceLeft.searchTextCount;
                    } else if (sliceLeft.hits.length !== sliceRight.hits.length) {
                      return sliceRight.hits.length - sliceLeft.hits.length;
                    } else {
                      return sliceLeft.start - sliceRight.start;
                    }
                  });

                  // select top N slices in content

                  var upperBound = parseInt('1');
                  if (upperBound >= 0) {
                    slicesOfContent = slicesOfContent.slice(0, upperBound);
                  }

                  // highlight title and content

                  function highlightKeyword(text, slice) {
                    var result = '';
                    var prevEnd = slice.start;
                    slice.hits.forEach(function (hit) {
                      result += text.substring(prevEnd, hit.position);
                      var end = hit.position + hit.length;
                      result += '<b class="search-keyword">' + text.substring(hit.position, end) + '</b>';
                      prevEnd = end;
                    });
                    result += text.substring(prevEnd, slice.end);
                    return result;
                  }

                  var resultItem = '';

                  if (slicesOfTitle.length != 0) {
                    resultItem += "<li><a href='" + articleUrl + "' class='search-result-title'>" + highlightKeyword(title, slicesOfTitle[0]) + "</a>";
                  } else {
                    resultItem += "<li><a href='" + articleUrl + "' class='search-result-title'>" + title + "</a>";
                  }

                  slicesOfContent.forEach(function (slice) {
                    resultItem += "<a href='" + articleUrl + "'>" +
                      "<p class=\"search-result\">" + highlightKeyword(content, slice) +
                      "...</p>" + "</a>";
                  });

                  resultItem += "</li>";
                  resultItems.push({
                    item: resultItem,
                    searchTextCount: searchTextCount,
                    hitCount: hitCount,
                    id: resultItems.length
                  });
                }
              })
            };
            if (keywords.length === 1 && keywords[0] === "") {
              resultContent.innerHTML = '<div id="no-result"><i class="fa fa-search fa-5x" /></div>'
            } else if (resultItems.length === 0) {
              resultContent.innerHTML = '<div id="no-result"><i class="fa fa-frown-o fa-5x" /></div>'
            } else {
              resultItems.sort(function (resultLeft, resultRight) {
                if (resultLeft.searchTextCount !== resultRight.searchTextCount) {
                  return resultRight.searchTextCount - resultLeft.searchTextCount;
                } else if (resultLeft.hitCount !== resultRight.hitCount) {
                  return resultRight.hitCount - resultLeft.hitCount;
                } else {
                  return resultRight.id - resultLeft.id;
                }
              });
              var searchResultList = '<ul class=\"search-result-list\">';
              resultItems.forEach(function (result) {
                searchResultList += result.item;
              })
              searchResultList += "</ul>";
              resultContent.innerHTML = searchResultList;
            }
          }

          if ('auto' === 'auto') {
            input.addEventListener('input', inputEventFunction);
          } else {
            $('.search-icon').click(inputEventFunction);
            input.addEventListener('keypress', function (event) {
              if (event.keyCode === 13) {
                inputEventFunction();
              }
            });
          }

          // remove loading animation
          $(".local-search-pop-overlay").remove();
          $('body').css('overflow', '');

          proceedsearch();
        }
      });
    }

    // handle and trigger popup window;
    $('.popup-trigger').click(function(e) {
      e.stopPropagation();
      if (isfetched === false) {
        searchFunc(path, 'local-search-input', 'local-search-result');
      } else {
        proceedsearch();
      };
    });

    $('.popup-btn-close').click(onPopupClose);
    $('.popup').click(function(e){
      e.stopPropagation();
    });
    $(document).on('keyup', function (event) {
      var shouldDismissSearchPopup = event.which === 27 &&
        $('.search-popup').is(':visible');
      if (shouldDismissSearchPopup) {
        onPopupClose();
      }
    });
  </script>





  

  

  

  
  

  

  

  


  <!-- Mermaid support -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    .mermaid-container {
      position: relative;
      border: 1px solid #d8dee4;
      border-radius: 10px;
      background: #f6f8fa;
      margin: 1.8em 0;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      transition: box-shadow 0.3s ease;
    }
    .mermaid-container:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .mermaid-toolbar {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      display: flex;
      gap: 5px;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .mermaid-container:hover .mermaid-toolbar {
      opacity: 1;
    }
    .mermaid-btn {
      width: 30px;
      height: 30px;
      border: 1px solid #c8cdd3;
      border-radius: 6px;
      background: rgba(255,255,255,0.95);
      color: #57606a;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
      padding: 0;
    }
    .mermaid-btn:hover {
      background: #fff;
      color: #24292f;
      border-color: #8c959f;
      transform: translateY(-1px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .mermaid-wrapper {
      overflow: hidden;
      cursor: grab;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
      background: #f6f8fa;
    }
    .mermaid-wrapper:active {
      cursor: grabbing;
    }
    .mermaid-wrapper svg {
      background: #f6f8fa !important;
      transition: transform 0.15s ease-out;
      transform-origin: center center;
      max-width: 100%;
      display: block;
    }
    /* 全屏模式 */
    .mermaid-container.fullscreen {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 10000;
      border-radius: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      background: #f6f8fa;
    }
    .mermaid-container.fullscreen .mermaid-wrapper {
      flex: 1;
      width: 100%;
      height: 100%;
      padding: 40px;
      background: #f6f8fa;
    }
    .mermaid-container.fullscreen .mermaid-wrapper svg {
      background: #f6f8fa !important;
    }
    .mermaid-container.fullscreen .mermaid-toolbar {
      opacity: 1;
      position: relative;
      top: auto;
      right: auto;
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid #d8dee4;
      justify-content: flex-end;
    }
    .mermaid-container.fullscreen .mermaid-btn {
      width: 36px;
      height: 36px;
      font-size: 17px;
    }
  </style>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      mermaid.initialize({ startOnLoad: true, theme: 'neutral' });
      
      function initMermaidInteractive() {
        document.querySelectorAll('.mermaid').forEach(function(el) {
          if (el.closest('.mermaid-container')) return;
          var svg = el.tagName === 'svg' ? el : el.querySelector('svg');
          if (!svg) return;
          
          // 统一 SVG 和容器背景色
          svg.style.background = '#f6f8fa';
          
          var container = document.createElement('div');
          container.className = 'mermaid-container';
          
          var toolbar = document.createElement('div');
          toolbar.className = 'mermaid-toolbar';
          toolbar.innerHTML =
            '<button class="mermaid-btn" title="放大" data-action="zoom-in">＋</button>' +
            '<button class="mermaid-btn" title="缩小" data-action="zoom-out">－</button>' +
            '<button class="mermaid-btn" title="重置" data-action="reset">↺</button>' +
            '<button class="mermaid-btn" title="全屏" data-action="fullscreen">⛶</button>';
          
          var wrapper = document.createElement('div');
          wrapper.className = 'mermaid-wrapper';
          
          var parent = el.parentNode;
          parent.insertBefore(container, el);
          wrapper.appendChild(el);
          container.appendChild(toolbar);
          container.appendChild(wrapper);
          
          var scale = 1;
          var translateX = 0, translateY = 0;
          var isDragging = false;
          var startX, startY;
          var isFullscreen = false;
          
          function updateTransform() {
            el.style.transform = 'translate(' + translateX + 'px, ' + translateY + 'px) scale(' + scale + ')';
          }
          
          // 自动适配容器大小
          function fitToContainer() {
            var wrapperRect = wrapper.getBoundingClientRect();
            var svgRect = svg.getBoundingClientRect();
            var padding = isFullscreen ? 80 : 40;
            
            var availableW = wrapperRect.width - padding;
            var availableH = wrapperRect.height - padding;
            
            // 获取 SVG 原始尺寸（考虑当前缩放）
            var svgWidth = svgRect.width / scale;
            var svgHeight = svgRect.height / scale;
            
            var scaleX = availableW / svgWidth;
            var scaleY = availableH / svgHeight;
            var newScale = Math.min(scaleX, scaleY, 1);
            
            if (newScale < 1 && newScale > 0.1) {
              scale = newScale;
            } else {
              scale = 1;
            }
            translateX = 0;
            translateY = 0;
            updateTransform();
          }
          
          toolbar.querySelectorAll('.mermaid-btn').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
              e.stopPropagation();
              var action = this.dataset.action;
              if (action === 'zoom-in') {
                scale = Math.min(scale * 1.25, 5);
                updateTransform();
              } else if (action === 'zoom-out') {
                scale = Math.max(scale / 1.25, 0.2);
                updateTransform();
              } else if (action === 'reset') {
                fitToContainer();
              } else if (action === 'fullscreen') {
                if (document.fullscreenElement) {
                  document.exitFullscreen();
                } else {
                  container.requestFullscreen().catch(function() {
                    container.classList.add('fullscreen');
                    isFullscreen = true;
                    setTimeout(fitToContainer, 100);
                  });
                }
              }
            });
          });
          
          wrapper.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
            wrapper.style.cursor = 'grabbing';
            e.preventDefault();
          });
          
          document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
          });
          
          document.addEventListener('mouseup', function() {
            isDragging = false;
            wrapper.style.cursor = 'grab';
          });
          
          wrapper.addEventListener('wheel', function(e) {
            e.preventDefault();
            var delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.max(0.2, Math.min(5, scale * delta));
            updateTransform();
          }, { passive: false });
          
          document.addEventListener('fullscreenchange', function() {
            if (document.fullscreenElement === container) {
              isFullscreen = true;
              setTimeout(fitToContainer, 150);
            } else {
              isFullscreen = false;
              container.classList.remove('fullscreen');
              setTimeout(function() {
                scale = 1;
                translateX = 0;
                translateY = 0;
                updateTransform();
              }, 100);
            }
          });
          
          // 初始适配
          setTimeout(fitToContainer, 100);
        });
      }
      
      if (document.querySelectorAll('.mermaid').length > 0) {
        var observer = new MutationObserver(function(mutations, obs) {
          var rendered = document.querySelectorAll('.mermaid svg').length > 0;
          if (rendered) {
            initMermaidInteractive();
            obs.disconnect();
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });
        setTimeout(function() {
          initMermaidInteractive();
          observer.disconnect();
        }, 2000);
      }
    });
  </script>
